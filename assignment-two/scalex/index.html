<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>assignment two</title>
</head>

<body>
    <main>
        <header>
            <div class="logo"><img src="assets/scalex-logo-transparent.webp" alt=""></div>
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About Us</a></li>
                    <li><a href="#blogs">Blogs</a></li>
                    <li><a href="#contact">Contact Us</a></li>
                </ul>
            </nav>
            <div class="get-started"><button>Get Started</button></div>
        </header>
        <section class="hero">
            <div class="heading">
                <h1>Insights & Blogs</h1>
            </div>
            <ul class="filter-options">
                <li class="filter-btn active">All</li>
                <li class="filter-btn">Tech</li>
                <li class="filter-btn">SaaS</li>
                <li class="filter-btn">Marketing</li>
            </ul>
            <div class="blog-card">
                <div class="card">
                    <img src="assets/classic-martini-cocktail.png" alt="classic-martini-cocktail">
                    <div class="card-content">
                        <div class="category">Tech</div>
                        <h2 class="post-title">The Ultimate Guide To SaaS Marketing</h2>
                        <div class="date">May 23, 2025</div>
                    </div>

                </div>
                <div class="card">
                    <img src="assets/green-chair.png" alt="green-chair">
                    <div class="card-content">
                        <div class="category">SaaS</div>
                        <h2 class="post-title">5 Key Trends In SaaS Growth For 2025</h2>
                        <div class="date">May 23, 2025</div>
                    </div>
                </div>
                <div class="card">
                    <img src="assets/cat-image.png" alt="cat-image">
                    <div class="card-content">
                        <div class="category">Marketing</div>
                        <h2 class="post-title">How Data-Driven Strategies Are Important</h2>
                        <div class="date">May 23, 2025</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
