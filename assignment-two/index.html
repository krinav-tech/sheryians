<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-two</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tasks{
            margin-top: 100px;
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }

        .tasks a{
            width: 33.33%;
            text-align: center;
            padding: 1rem;
            font-size: 26px;
            text-decoration: none;
            box-shadow: rgba(99, 99, 99, 0.2) 0px 2px 8px 0px;
            transition: all 0.3s ease;
        }

        .tasks a:hover{
            transform: translateY(-15px) scale(1.05);
            box-shadow: rgba(99, 99, 99, 0.4) 0px 8px 16px 0px;
        }

        .tasks img {
            width: 100%;
            height: auto;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <main>
        <div class="heading">
            <h1>assignment two</h1>
        </div>
        <div class="tasks">
            <a href="/scalex/index.html">
                <img src="/scalex/assignment-two.png" alt="assignment-two-task-one-image">
                view task
            </a>
            <a href="/shape-the-future/index.html">
                <img src="/shape-the-future/assests/shape-the-future-task.png" alt="assignment-two-task-two-image">
                view task
            </a>
            <a href="/insect/index.html">
                <img src="/insect/assets/insect-task.png" alt="assignment-two-task-tree-image">
                view task
            </a>
        </div>
    </main>
</body>

</html>
