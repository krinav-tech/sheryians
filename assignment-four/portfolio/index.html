<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
        integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Portfolio</title>
</head>

<body>
    <main>
        <nav class="box nav">
            <ul class="menu">
                <li class="menu-items"><a href="#">podcast</a></li>
                <li class="menu-items"><a href="#">portfolio</a></li>
                <li class="menu-items"><a href="#">reserch</a></li>
                <li class="menu-items"><a href="#">clients</a></li>
            </ul>
        </nav>
        <div class="box about-card-box">
            <p class="about-me"><img src="./assets/plus_88028.png" alt="">about me</p>
            <div class="about-card">
                <div class="profile-picture">
                    <div class="white-border">
                        <div class="pink-bg">
                            <img class="jon-photo" src="./assets/jon-photo.png">
                        </div>
                    </div>
                </div>
                <h1 class="name"><span>im,</span><br>Jon<br>Daniel</h1>
                <p class="email">inquiry@jondniel.design <i class="ri-mail-send-line"></i></p>
                <div class="circle-badge"><img src="./assets/black_circle-removebg-preview.png" alt=""></div>
            </div>
        </div>
        <div class="box portfolio">Portfolio <i class="ri-arrow-up-s-line"></i></div>
        <div class="box batak">
            <i class="ri-arrow-up-s-line"></i>
            <div class="play-btn">
                <i class="ri-play-fill"></i>
            </div>
        </div>
        <div class="box projects">
            <div class="blue-box">
                <i class="ri-arrow-up-s-line"></i>
                <span class="number">251</span>
                <span class="det">Projects</span>
            </div>
            <div class="purple-box">
                <i class="ri-arrow-up-s-line"></i>
                <span class="number">156</span>
                <span class="det">Awards</span>
            </div>
        </div>
        <div class="box clients"> <i class="ri-arrow-up-s-line"></i>
            <span class="det">
                <i class="ri-apple-fill"></i>
                Clients
            </span>
        </div>
        <div class="box global">
            <div class="black-box">
                <div class="left-part">
                    <div class="ball-img"><img src="./assets/ball.png" alt=""></div>
                </div>
                <div class="yellow-box">
                    <i class="ri-arrow-up-s-line"></i>
                    <span class="number">172</span>
                    <span class="det">Globsl Design <br> Awards.</span>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
